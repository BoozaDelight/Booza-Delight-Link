<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booza Delight | Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sage: #c8cfab;
      --sage-deep: #aeb68d;
      --blush: #e6c6c2;
      --cream: #f5efe5;
      --soft-white: rgba(255,255,255,0.70);
      --text: #55604a;
      --shadow: 0 10px 30px rgba(126, 121, 103, 0.16);
      --border: rgba(200, 207, 171, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Cormorant Garamond', serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(200, 207, 171, 0.35), transparent 30%),
        radial-gradient(circle at top right, rgba(230, 198, 194, 0.28), transparent 25%),
        radial-gradient(circle at bottom left, rgba(245, 239, 229, 0.95), transparent 35%),
        linear-gradient(180deg, #fcfaf7 0%, #f7f3ee 100%);
      display: flex;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .pattern {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.08;
      background-image:
        radial-gradient(circle at 25px 25px, var(--sage) 2px, transparent 2px),
        radial-gradient(circle at 75px 75px, var(--blush) 2px, transparent 2px);
      background-size: 100px 100px;
      mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
      -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
    }

    .wrap {
      width: 100%;
      max-width: 540px;
      position: relative;
      z-index: 1;
    }

    .card {
      backdrop-filter: blur(8px);
      background: rgba(255, 251, 246, 0.68);
      border: 1px solid var(--border);
      border-radius: 36px;
      box-shadow: var(--shadow);
      padding: 34px 22px 30px;
      text-align: center;
    }

    .logo-box {
      width: 190px;
      max-width: 70%;
      margin: 0 auto 12px;
    }

    .logo-box img {
      width: 100%;
      display: block;
      filter: drop-shadow(0 4px 18px rgba(0,0,0,0.05));
    }

    h1 {
      margin: 0;
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .tagline {
      margin: 10px 0 28px;
      font-size: 1.12rem;
      line-height: 1.35;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-decoration: none;
      color: var(--text);
      font-size: 1.35rem;
      font-weight: 600;
      line-height: 1;
      border-radius: 999px;
      min-height: 72px;
      padding: 16px 20px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.55);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }

    .link-btn:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 14px 30px rgba(126, 121, 103, 0.2);
      filter: brightness(1.01);
    }

    .link-btn:active {
      transform: translateY(0);
    }

    .pink { background: linear-gradient(180deg, #efd1cd 0%, #e5c2bd 100%); }
    .green { background: linear-gradient(180deg, #d7ddc0 0%, #c6cea6 100%); }
    .cream { background: linear-gradient(180deg, #fffaf4 0%, #f4ede3 100%); }

    .icon {
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 26px;
    }

    .icon svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .footer {
      margin-top: 26px;
      font-size: 1.05rem;
      line-height: 1.55;
    }

    .footer a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid rgba(85,96,74,0.25);
    }

    .mini {
      margin-top: 12px;
      font-size: 0.98rem;
      opacity: 0.88;
    }

    @media (max-width: 480px) {
      body { padding: 12px; }
      .card { padding: 28px 16px 24px; border-radius: 28px; }
      .link-btn { font-size: 1.15rem; min-height: 66px; }
      .tagline { font-size: 1rem; }
      .footer { font-size: 0.98rem; }
    }
  </style>
</head>
<body>
  <div class="pattern"></div>

  <main class="wrap">
    <div style="position:absolute; top:10px; left:10px; z-index:2;">
      <a href="https://search.google.com/local/writereview?placeid=ChIJc5cPz4vJMIgR2K7QWb9Y2m0" target="_blank" style="text-decoration:none; font-size:0.95rem; background:rgba(255,255,255,0.7); padding:8px 14px; border-radius:999px; box-shadow:0 6px 16px rgba(0,0,0,0.08);">⭐ Leave a 5-Star Review</a>
    </div>
    <section class="card">
      <div class="logo-box">
        <!-- Replace src with your uploaded logo file path in GitHub, such as images/logo.png -->
        <img src="bd-logo.png" alt="Booza Delight logo" />
      </div>

      <h1>Booza Delight</h1>
      <p class="tagline">Homemade Booza &amp; Specialty Drinks</p>

      <div class="links">
        <a class="link-btn cream" href="https://www.instagram.com/booza_delight/?hl=en" target="_blank" rel="noopener noreferrer">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5"></rect><circle cx="12" cy="12" r="4.2"></circle><circle cx="17.2" cy="6.8" r="0.8" fill="currentColor" stroke="none"></circle></svg>
          </span>
          Instagram
        </a>

        <a class="link-btn green" href="https://www.tiktok.com/@boozadelight?lang=en" target="_blank" rel="noopener noreferrer">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M14 4v9.2a4.8 4.8 0 1 1-4.8-4.8"></path><path d="M14 4c1 2.4 2.7 3.9 5 4.4"></path></svg>
          </span>
          TikTok
        </a>

        <a class="link-btn pink" href="https://www.facebook.com/boozadelight/" target="_blank" rel="noopener noreferrer">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M14 8h3V4h-3c-2.8 0-5 2.2-5 5v3H6v4h3v4h4v-4h3l1-4h-4v-2.5c0-.8.6-1.5 1-1.5Z"></path></svg>
          </span>
          Facebook
        </a>

        <a class="link-btn pink" href="https://www.doordash.com/en/store/booza-delight-dearborn-heights-24278022/97466559/?srsltid=AfmBOoqDRWKQSMTi63vxSulA2rWfTnwN8P9AK5bknMzQ6nXEBt7GTv5l" target="_blank" rel="noopener noreferrer">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M3 12h6.5c2.4 0 3.7-1.7 3.7-3.3S11.9 5.4 9.5 5.4H6.7"></path><path d="M3.7 8.7h7.8c3.9 0 6.5 2.4 6.5 5.5s-2.6 5.2-6.5 5.2H8.3"></path></svg>
          </span>
          Order on DoorDash
        </a>

        <a class="link-btn green" href="mailto:info.boozadelight@gmail.com">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M4 6h16v12H4z"></path><path d="M4 7l8 6 8-6"></path></svg>
          </span>
          Email for Events
        </a>
      </div>

      <div class="footer">
        <div>24439 W Warren St<br>Dearborn Heights, MI 48127</div>
        <div class="mini"><a href="https://www.google.com/maps/search/?api=1&query=24439+W+Warren+St+Dearborn+Heights+MI+48127" target="_blank" rel="noopener noreferrer">Open in Maps</a></div>
      </div>
    </section>
  </main>
</body>
</html>
